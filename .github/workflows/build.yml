name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: تحميل المشروع
        uses: actions/checkout@v4

      - name: تثبيت Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: إعطاء صلاحية تشغيل gradlew
        run: chmod +x gradlew

      - name: إعداد Gradle Wrapper (حل مشكلة Permission)
        run: ./gradlew wrapper

      - name: بناء APK
        run: ./gradlew assembleDebug

      - name: رفع APK
        uses: actions/upload-artifact@v4
        with:
          name: MorseApp-APK
          path: app/build/outputs/apk/debug/app-debug.apk
